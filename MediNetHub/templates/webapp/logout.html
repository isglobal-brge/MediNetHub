{% extends 'base_public.html' %}

{% block title %}MediNet - Signed Out{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pages/auth.css">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="logout-card">

        <div class="logout-icon">
            <i data-lucide="check" width="28" height="28"></i>
        </div>

        <h3 class="mb-2">You have been signed out</h3>
        <p class="text-secondary mb-6">Your session has been closed successfully. See you next time.</p>

        <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'login' %}" class="btn btn-primary btn-gradient">
                <i data-lucide="log-in" width="16" height="16" class="me-2"></i>
                Sign in again
            </a>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                <i data-lucide="home" width="16" height="16" class="me-2"></i>
                Go to home
            </a>
        </div>

    </div>
</div>
{% endblock %}

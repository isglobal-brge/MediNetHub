services:
  medinethub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medinethub_app
    ports:
      - "5000:5000"
      - "8080:8080"
    volumes:
      - ./config:/usr/src/app/config
      - db_data:/usr/src/app
      - ./media:/usr/src/app/media
      - ./staticfiles:/usr/src/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=medinet.settings
      - PYTHONUNBUFFERED=1
      # IMPORTANT: Set your host machine IP here so clients can connect to Flower server
      # Find your IP: Linux/Mac: hostname -I | Windows: ipconfig
      - FLOWER_SERVER_IP=172.25.0.2
      # ---- DEVELOPMENT MODE (default) --------------------------------------
      # DEBUG=True relaxes the fail-closed guards (SECRET_KEY dev fallback,
      # ALLOWED_HOSTS wildcard, plaintext Flower allowed). The entrypoint still
      # auto-generates TLS certs for the Flower server, so the channel uses TLS.
      # For a DEPLOY run, flip to:
      #   - DJANGO_DEBUG=False
      #   - DJANGO_ALLOWED_HOSTS=your.domain,1.2.3.4   (required when DEBUG=False)
      # SECRET_KEY is auto-generated & persisted by entrypoint.sh in either mode.
      - DJANGO_DEBUG=True
      # - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - medinet_network

volumes:
  db_data:
    driver: local

networks:
  medinet_network:
    driver: bridge
    name: medinet_shared_network
    external: false
    ipam:
      config:
        - subnet: 172.25.0.0/16
